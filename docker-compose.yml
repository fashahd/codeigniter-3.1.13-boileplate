services:
  app:
    build:
      context: .
    container_name: ci3
    volumes:
      - .:/var/www/html
  
  nginx:
    image: nginx:latest
    container_name: ci3-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app